<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Streben Lager">
<title>Streben Lager</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#111827}
.header{background:#111827;color:white;padding:26px 18px;border-radius:0 0 28px 28px}
.header h1{margin:0;font-size:28px}
.header p{margin:8px 0 0;color:#d1d5db}
.wrap{max-width:650px;margin:auto;padding:18px}
.card{background:white;border-radius:22px;padding:22px;margin:14px 0;box-shadow:0 8px 26px rgba(0,0,0,.08)}
.search{width:100%;padding:15px;border:1px solid #d1d5db;border-radius:14px;font-size:17px;margin-bottom:12px}
.item{display:flex;justify-content:space-between;align-items:center;padding:18px;border-radius:18px;background:#f9fafb;margin:10px 0;text-decoration:none;color:#111827}
.item b{font-size:21px}
.badge{font-weight:900;font-size:20px}
.big{font-size:76px;font-weight:900;letter-spacing:-3px;margin:10px 0}
.unit{font-size:22px;color:#6b7280}
.status{display:inline-block;margin-top:16px;padding:11px 15px;border-radius:999px;font-weight:800}
.ok{background:#dcfce7;color:#166534}
.warn{background:#fef3c7;color:#92400e}
.low{background:#fee2e2;color:#991b1b}
.btn{display:block;text-align:center;background:#111827;color:white;text-decoration:none;border-radius:16px;padding:16px;font-weight:800;margin-top:14px}
.small{font-size:14px;color:#6b7280;line-height:1.45}
.error{background:#fee2e2;color:#991b1b;border-radius:18px;padding:16px}
.loading{text-align:center;color:#6b7280;padding:30px}
</style>
</head>
<body>
<div class="header">
  <h1>📦 Streben Lager</h1>
  <p>Live aus Supabase · QR-Code scannen → Lagerstand anzeigen</p>
</div>
<div class="wrap" id="app"><div class="card loading">Lade Lagerbestand...</div></div>

<script>
const SUPABASE_URL = "https://yxqqevyybwcfkurvqwnt.supabase.co/rest/v1";
const SUPABASE_KEY = "sb_publishable_HlI-36AWnZG1dDVBeaRcrg_QNEeKmyC";
let streben = [];

function codeFromStrebe(name) {
  return String(name).replace(" cm","").replace(",", "_").replace(".", "_").trim();
}

function getCode() {
  return new URLSearchParams(location.search).get("s");
}

function statusClass(s) {
  if (Number(s.bestand) <= Number(s.mindeststand)) return "low";
  if (Number(s.bestand) <= Number(s.mindeststand) * 2) return "warn";
  return "ok";
}

function statusText(s) {
  if (Number(s.bestand) <= Number(s.mindeststand)) return "🔴 Nachbestellen";
  if (Number(s.bestand) <= Number(s.mindeststand) * 2) return "🟡 Bestand knapp";
  return "🟢 Bestand ausreichend";
}

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/Lager?select=id,Strebe,bestand,mindeststand&order=id.asc`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });
    if (!res.ok) throw new Error(await res.text());
    streben = await res.json();
    const code = getCode();
    code ? renderItem(code) : renderList();
  } catch (err) {
    document.getElementById("app").innerHTML = `
      <div class="card error">
        <b>Fehler beim Laden der Lagerdaten.</b><br><br>
        Bitte Supabase-Verbindung prüfen.<br>
        <small>${String(err).slice(0, 300)}</small>
      </div>`;
  }
}

function renderList() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="card">
      <input class="search" id="q" placeholder="Strebe suchen, z. B. 90" oninput="filterList()">
      <div id="list"></div>
    </div>`;
  filterList();
}

function filterList() {
  const q = (document.getElementById("q")?.value || "").toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = streben
    .filter(s => String(s.Strebe).toLowerCase().includes(q) || codeFromStrebe(s.Strebe).includes(q))
    .map(s => `<a class="item" href="?s=${codeFromStrebe(s.Strebe)}">
      <div><b>${s.Strebe}</b><br><span class="small">${statusText(s)} · Mindestbestand: ${s.mindeststand}</span></div>
      <div class="badge">${s.bestand} Stk.</div>
    </a>`).join("");
}

function renderItem(code) {
  const s = streben.find(x => codeFromStrebe(x.Strebe) === code);
  if (!s) return renderList();
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Strebe ${s.Strebe}</h2>
      <div class="small">Aktueller Lagerstand aus Supabase</div>
      <div class="big">${s.bestand}</div>
      <div class="unit">Stück</div>
      <div class="status ${statusClass(s)}">${statusText(s)}</div>
    </div>
    <div class="card small">
      Mindestbestand: <b>${s.mindeststand} Stück</b><br>
      QR-Link für diese Strebe endet mit: <b>?s=${codeFromStrebe(s.Strebe)}</b>
    </div>
    <a class="btn" href="./">← Übersicht</a>`;
}

loadData();
</script>
</body>
</html>
